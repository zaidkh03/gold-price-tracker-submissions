<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoldTracker - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #ede8d8;
        }

        .auth-card {
            max-width: 500px;
            margin: 80px auto;
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            height: auto;
            background-color: #f9f0d0;
        }

        .btn-gold {
            background-color: #D4AF37;
            color: white;
            border: none;
        }

        .btn-gold:hover {
            background-color: #B8860B;
            color: white;
        }

        .toggle-link {
            cursor: pointer;
            color: #B8860B;
            text-decoration: underline;
        }

        .toggle-link:hover {
            color: #D4AF37
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>
    <div class="container">
        <div class="card auth-card p-4">
            <div class="text-center mb-4">
                <h2 id="auth-title">Welcome Back</h2>
                <p class="text-muted" id="auth-subtitle">Login to manage your gold assets</p>
            </div>

            <form id="auth-form" onsubmit="handelRegister(event); return false;">
                <div class="mb-3 d-none" id="name-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="user-name" class="form-control" placeholder="Name">
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" id="user-email" class="form-control" placeholder="name@example.com" required>
                </div>



                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <input type="password" id="user-pass" class="form-control" placeholder="••••••••" required>
                        <button class="btn btn-outline-secondary" type="button"
                            onclick="togglePassword('user-pass', this)">Show</button>
                    </div>
                </div>


                <div class="mb-3 d-none" id="confirm-group">
                    <label class="form-label">Confirm Password</label>

                    <div class="input-group">
                        <input type="password" id="user-pass-confirm" class="form-control" placeholder="••••••••">
                        <button class="btn btn-outline-secondary" type="button"
                            onclick="toggleConfirm('user-pass-confirm', this)">Show</button>
                        <p id="pass-feedback"></p>




                    </div>


                </div>

                <div class="mb-3 d-none" id="phone-group">
                    <label class="form-label" for="phone"> Phone Number</label>
                    <input type="tel" class="form-control" id="phone" placeholder="+962*********">
                    <div class="form-text text-danger d-none" id="phoneError">Please Choose Your Gender</div>
                </div>

                <div class="mb-3 d-none" id="gender-group">
                    <label class="form-label" for="gender">Gender</label>
                    <select class="form-select" id="gender">
                        <option value="">Gender</option>
                        <option value="male">Male</option>
                        <option value="female">Female</option>
                    </select>
                    <div class="form-text text-danger d-none" id="genderError">Please Choose Your Gender</div>
                </div>

                <div>
                    <p id="alert" class="text-danger small">Invalid Email or Passowrd!</p>
                </div>

                <button class="btn btn-gold w-100 py-2 mb-3 btn-register" id="auth-btn">Login</button>
            </form>

            <div class="text-center">
                <p id="toggle-text">Don't have an account? <span class="toggle-link" onclick="toggleAuth()">Register
                        here</span></p>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        fetch('header.html')
            .then(res => res.text())
            .then(data => {
                document.getElementById('header-placeholder').innerHTML = data;
            });
    </script>
    <script>
        function loadNewsComponent() {
            fetch('news.html')
                .then(response => {
                    if (!response.ok) throw new Error("Could not find news.html");
                    return response.text();
                })
                .then(html => {
                    const placeholder = document.getElementById('news-placeholder');
                    if (!placeholder) return;

                    placeholder.innerHTML = html;

                    const embeddedScript = placeholder.querySelector('script');
                    if (embeddedScript) embeddedScript.remove();


                    const newScript = document.createElement('script');
                    newScript.src = 'news.js';
                    document.body.appendChild(newScript);
                })
                .catch(err => console.error("News Component Error:", err));
        }

        loadNewsComponent();
    </script>

</body>

</html>
