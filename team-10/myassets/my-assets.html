<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Assets</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="my-assets.css">
</head>

<body>

  <div id="header-placeholder"></div>

  <main class="main-container">

    <div class="top-section">
      <div>
        <h2>My Assets</h2>
        <p>Manage your gold assets and track your profit/loss</p>
      </div>

      <div class="search-filter">
        <input type="text" id="searchInput" placeholder="Search assets...">

        <select id="filterType">
          <option value="All">All Types</option>
          <option value="Jewelry">Jewelry</option>
          <option value="Coins">Coins</option>
          <option value="Bars">Bars</option>
        </select>
      </div>
    </div>

    
    <div class="layout">

      
      <div class="form-box">
        <h3>Add New Asset</h3>

        <form id="addAssetForm">

          <label>Asset Type</label>
          <select id="assetType" required>
            <option value="">Choose...</option>
            <option value="Jewelry">Jewelry</option>
            <option value="Coins">Coins</option>
            <option value="Bars">Bars</option>
          </select>

          <div class="row">
            <div>
              <label>Karat</label>
              <select id="assetKarat" required>
                <option value="24">24K</option>
                <option value="21">21K</option>
                <option value="18">18K</option>
              </select>
            </div>

            <div>
              <label>Weight (g)</label>
              <input type="number" step="0.01" id="assetWeight" required>
            </div>
          </div>

          <label>Item Name </label>
          <input type="text" id="assetName" required>

          <div class="row">
            <div>
              <label>Purchase Price ($)</label>
              <input type="number" step="0.01" id="assetPrice" required>
            </div>
            
            <div>
              <label>Purchase Date</label>
              <input type="date" id="assetDate" required>
            </div>
          </div>

          <label>Asset Image </label>
          <input type="file" id="assetPhoto" accept="image/*" class="form-control">

          <button type="submit">Save Asset</button>

        </form>
      </div>

     
      <div class="assets-box" id="assetsContainer">

        <div class="empty-state" id="emptyState">
          <h4>No assets yet</h4>
          <p>Add your first  item</p>
        </div>

      </div>

    </div>

  </main>

  <script>
    fetch('/header.html')
      .then(res => res.text())
      .then(data => {
        // 1. Load the header onto the page
        document.getElementById('header-placeholder').innerHTML = data;

        // 2. Find the exact button we just named
        const loginBtn = document.getElementById('nav-login-btn');
        
        // 3. Check if the user is logged in
        const isLoggedIn = sessionStorage.getItem('isLoggedIn') === 'true';

        
        if (isLoggedIn && loginBtn) {
            loginBtn.textContent = 'Logout';     
            loginBtn.style.color = '#C62828';      
            loginBtn.href = '#';                   
            
            // Make clicking it actually log them out
            loginBtn.onclick = function(event) {
                event.preventDefault();
                sessionStorage.clear();            
                window.location.href = '/login.html'; 
            };
        }
      })
      .catch(err => console.error("Error loading header:", err));
  </script>

  <script src="my-assets.js"></script>

</body>
</html>
