<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Track your personal gold assets in real-time.">
    <link rel="shortcut icon" href="../assets/img/logo.png" type="image/x-icon">
    <title>24K | Assets Management</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <!-- Shared styles -->
    <link rel="stylesheet" href="../assets/css/style.css">
    <!-- Assets-page specific -->
    <link rel="stylesheet" href="../assets/css/assets-page.css">
</head>

<body>

    <!-- Preloader -->
    <div class="preloader position-fixed vh-100 w-100 d-flex justify-content-center align-items-center" id="preloader">
        <img src="../assets/img/logo.webp" alt="24k logo" class="img-fluid loader-logo">
    </div>

    <header>
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-dark py-3">
            <div class="container-fluid d-flex align-items-center">
                <a class="navbar-brand fw-bold d-lg-none me-auto" href="../index.html">24K GOLD</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0 ms-lg-4">
                        <li class="nav-item me-2"><a class="nav-link page" href="../index.html">Home</a></li>
                        <li class="nav-item me-2"><a class="nav-link page" href="assets.html">My Assets</a></li>
                    </ul>

                    <a class="navbar-brand mx-auto fw-bold d-none d-lg-block" href="../index.html">24K GOLD</a>

                    <ul class="navbar-nav ms-auto d-flex flex-row align-items-center gap-2 me-lg-4">
                        <li class="nav-item">
                            <button class="currency-toggle-btn" id="currency-toggle">Switch to JOD</button>
                        </li>
                        <li class="nav-item px-2">
                            <a class="nav-link" href="#" id="theme-toggle">
                                <i class="fa-solid fa-circle-half-stroke fs-5"></i>
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="logBtn btn" href="login-register.html" id="authBtn">Log in</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Header body -->
        <div class="container-fluid p-0">
            <div class="row">

                <!-- Aside: live rates -->
                <div class="col-12 col-md-6 col-lg-3 order-2 order-lg-1">
                    <aside class="p-1">
                        <p class="text-gold fw-bolder my-4 ms-4" style="font-size:.8rem; letter-spacing:2px;">LIVE MARKET RATES</p>
                        <div id="aside"></div>
                    </aside>
                </div>

                <!-- Assets area -->
                <div class="col-12 col-md-6 col-lg-9 order-1 order-lg-2">
                    <div class="filter-bar d-flex flex-wrap gap-3 p-4 my-5 rounded-4 align-items-center">
                        <div class="flex-grow-1 position-relative">
                            <input type="text" id="search-input"
                                class="form-control bg-transparent text-white ps-5 py-2"
                                placeholder="Search by name (PAMP, Coin, Bar)...">
                            <i class="fa-solid fa-magnifying-glass position-absolute"></i>
                        </div>
                        <select class="form-select w-auto" id="types">
                            <option selected>All Types</option>
                            <option value="Bar">Bar</option>
                            <option value="EnglishLira">English Lira</option>
                            <option value="RashadiLira">Rashadi Lira</option>
                            <option value="Jewelry">Jewelry</option>
                        </select>
                        <select class="form-select w-auto" id="karat">
                            <option selected>All Karats</option>
                            <option value="24K">24K</option>
                            <option value="21K">21K</option>
                            <option value="18K">18K</option>
                        </select>
                    </div>

                    <div class="row g-4" id="rowCard">

                        <!-- Add asset card -->
                        <div class="col-12 col-md-6 col-lg-4">
                            <div class="add-asset-card rounded-4 d-flex flex-column align-items-center justify-content-center"
                                data-bs-toggle="modal" data-bs-target="#addAssetModal" style="cursor:pointer;">
                                <div class="add-icon d-flex align-items-center justify-content-center mb-2 rounded-circle">
                                    <i class="fa-solid fa-plus fs-5 text-gold"></i>
                                </div>
                                <h5 class="text-gold mb-1">Add Asset</h5>
                                <p class="text-secondary small">Record a new purchase</p>
                            </div>
                        </div>

                        <!-- Add asset modal -->
                        <div class="modal fade" id="addAssetModal" tabindex="-1" aria-hidden="true">
                            <div class="modal-dialog modal-dialog-centered">
                                <div class="modal-content text-white border-secondary">
                                    <div class="modal-header border-secondary">
                                        <p class="modal-title text-gold">Add New Asset</p>
                                        <button type="button" class="btn-close btn-close-white"
                                            data-bs-dismiss="modal" aria-label="Close"></button>
                                    </div>
                                    <div class="modal-body">
                                        <form id="addAssetForm">
                                            <input type="hidden" id="editingId">
                                            <div class="mb-3">
                                                <label class="form-label">Asset Name</label>
                                                <input type="text" id="assetName"
                                                    class="form-control bg-transparent text-white border-secondary"
                                                    placeholder="e.g. PAMP Suisse Bar" required>
                                            </div>
                                            <div class="row">
                                                <div class="col-md-6 mb-3">
                                                    <label class="form-label">Type</label>
                                                    <select id="assetType" class="form-select bg-dark text-white border-secondary">
                                                        <option value="Bar">Bar</option>
                                                        <option value="EnglishLira">English Lira</option>
                                                        <option value="RashadiLira">Rashadi Lira</option>
                                                        <option value="Jewelry">Jewelry</option>
                                                    </select>
                                                    <input type="file" accept="image/*"
                                                        class="form-control bg-transparent text-white border-secondary mt-3"
                                                        id="asset-img" required>
                                                    <img id="img-preview" src="" alt="preview">
                                                </div>
                                                <div class="col-md-6 mb-3">
                                                    <label class="form-label">Karat</label>
                                                    <select id="assetKarat" class="form-select bg-dark text-white border-secondary">
                                                        <option value="24K">24K</option>
                                                        <option value="21K">21K</option>
                                                        <option value="18K">18K</option>
                                                    </select>
                                                </div>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Purchase Date</label>
                                                <input type="date" id="purchaseDate"
                                                    class="form-control bg-transparent text-white border-secondary" required>
                                            </div>
                                            <div class="mb-3">
                                                <label class="form-label">Purchase Price</label>
                                                <input type="number" id="purchasePrice"
                                                    class="form-control bg-transparent text-white border-secondary"
                                                    placeholder="0.00" required>
                                            </div>
                                            <div class="mb-3" id="gramField">
                                                <label class="form-label">Gram</label>
                                                <input type="number" id="gram"
                                                    class="form-control bg-transparent text-white border-secondary"
                                                    placeholder="0.00">
                                            </div>
                                        </form>
                                    </div>
                                    <div class="modal-footer border-secondary">
                                        <button type="button" class="btn btn-outline-secondary"
                                            data-bs-dismiss="modal">Cancel</button>
                                        <button type="submit" form="addAssetForm"
                                            class="btn btn-gold px-4 fw-bold">Add Asset</button>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>
        </div>
    </header>

    <!-- Footer -->
    <footer class="mt-3 py-2">
        <div class="container-fluid">
            <p class="pt-3 pb-1">&copy;2026
                <a href="https://www.linkedin.com/in/leen-saleh/" target="_blank">Leen</a>,
                <a href="https://www.linkedin.com/in/lujain-majid/" target="_blank">Lujain</a> &
                <a href="https://www.linkedin.com/in/zaidalkhalili/" target="_blank">Zaid</a>.
                All rights reserved.
            </p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/gold.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/assets.js"></script>
</body>
</html>
