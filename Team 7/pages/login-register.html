<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="../assets/img/logo.png" type="image/x-icon">
    <title>24K | Authentication</title>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <!-- Shared styles -->
    <link rel="stylesheet" href="../assets/css/style.css">
</head>

<body>

    <!-- Preloader -->
    <div class="preloader position-fixed vh-100 w-100 d-flex justify-content-center align-items-center" id="preloader">
        <img src="../assets/img/logo.webp" alt="24k logo" class="img-fluid loader-logo">
    </div>

    <div class="container-fluid d-flex align-items-center justify-content-center min-vh-100">

        <a href="../index.html" class="back-home position-absolute top-0 start-0 m-4 text-decoration-none">
            <i class="fas fa-arrow-left me-2"></i> Back to Home
        </a>

        <div class="flip-container" id="card">

            <!-- Login form -->
            <div class="auth-box login-box d-flex flex-column shadow-lg border-0 p-4 p-md-5">
                <div class="text-center mb-4">
                    <img src="../assets/img/logo.png" alt="24K logo" class="img-fluid object-fit-cover w-25 mb-1">
                    <p class="text-secondary small text-uppercase">Secure Login</p>
                </div>
                <form id="logForm">
                    <div class="mb-3">
                        <div class="input-group-custom position-relative mb-1">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="logEmail" class="form-control py-3 px-5 rounded-5"
                                placeholder="Email Address" required>
                        </div>
                        <p class="small text-danger ms-2" id="logEmail-error"></p>
                    </div>
                    <div class="mb-4">
                        <div class="input-group-custom position-relative mb-1">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="logPass" class="form-control py-3 px-5 rounded-5"
                                placeholder="Password" required>
                        </div>
                        <p class="small text-danger ms-2" id="logPass-error"></p>
                        <a href="#" class="text-gold small" id="forgotPass">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-gold w-100 py-3 fw-bold rounded-5">LOGIN</button>
                </form>
                <div class="switch-text mt-auto text-center pt-3">
                    <span class="text-secondary">New to 24K Gold?</span>
                    <span class="switch-link text-gold ms-1 fw-bold" onclick="FLIP_CARD()">Create Account</span>
                </div>
            </div>

            <!-- Register form -->
            <div class="auth-box register-box d-flex flex-column shadow-lg border-0 p-4 p-md-5">
                <div class="text-center mb-4">
                    <img src="../assets/img/logo.png" alt="24K logo" class="img-fluid object-fit-cover w-25 mb-1">
                    <p class="text-secondary small text-uppercase">Create Identity</p>
                </div>
                <form id="registerForm">
                    <div class="mb-3">
                        <div class="input-group-custom position-relative mb-1">
                            <i class="fas fa-user"></i>
                            <input type="text" id="fullName" class="form-control py-3 px-5 rounded-5"
                                placeholder="Full Name" required>
                        </div>
                        <p class="small text-danger ms-2" id="fullName-error"></p>
                    </div>
                    <div class="mb-3">
                        <div class="input-group-custom position-relative mb-1">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="regEmail" class="form-control py-3 px-5 rounded-5"
                                placeholder="Email Address" required>
                        </div>
                        <p class="small text-danger ms-2" id="regEmail-error"></p>
                    </div>
                    <div class="mb-3">
                        <div class="input-group-custom position-relative mb-1">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="regPass" class="form-control py-3 px-5 rounded-5"
                                placeholder="Create Password" required>
                        </div>
                        <p class="small text-danger ms-2" id="regPass-error"></p>
                    </div>
                    <div class="mb-4">
                        <div class="input-group-custom position-relative mb-1">
                            <i class="fas fa-shield-alt"></i>
                            <input type="password" id="confirmPass" class="form-control py-3 px-5 rounded-5"
                                placeholder="Confirm Password" required>
                        </div>
                        <p class="small text-danger ms-2" id="confirmPass-error"></p>
                    </div>
                    <button type="submit" class="btn btn-gold w-100 py-3 fw-bold rounded-5">REGISTER NOW</button>
                </form>
                <div class="switch-text mt-auto text-center pt-3">
                    <span class="text-secondary">Already a member?</span>
                    <span class="switch-link text-gold ms-1 fw-bold" onclick="FLIP_CARD()">Back to Login</span>
                </div>
            </div>

        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-3 py-2">
        <div class="container-fluid">
            <p class="pt-3 pb-1">&copy;2026
                <a href="https://www.linkedin.com/in/leen-saleh/" target="_blank">Leen</a>,
                <a href="https://www.linkedin.com/in/lujain-majid/" target="_blank">Lujain</a> &
                <a href="https://www.linkedin.com/in/zaidalkhalili/" target="_blank">Zaid</a>.
                All rights reserved.
            </p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../assets/js/auth.js"></script>
    <script src="../assets/js/utils.js"></script>
    <script src="../assets/js/autho.js"></script>
</body>
</html>
