<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Assets</title>
 
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
       <link rel="stylesheet" href="../style/asset.css" />
       <link rel="icon" href="/assets/icons/Gold.png">
    <!-- 
    input -- form-control
    select --form-select
    btn --btn 
    layout --grid 
    card --card
    row g-4 -- to make gap between columns 
    col-lg-4 
    col-lg-8 




-->
  </head>
  <body>
    
    <header>
        
      <video autoplay muted loop>
        <source
          src="../assets/video/gold1.mp4"
          type="video/mp4"
        />
      </video>
      <div class="container">
        <h1 class="display-4">MyAssets</h1>
        <div class="container-fluid">
          <input
            type="search"
            class="form-control category-search"
            placeholder="Search by category"
          />
          <select class="form-select type-search">
            <option>All Types</option>
            <option>Jewelry</option>
            <option>Bars</option>
            <option>Coins</option>
          </select>
        </div>
      </div>
    </header>

    <div class="row g-4">
      <div class="glass-card col-lg-3 p-4 offset-lg-1 mb-3">
        <form class="assets-form">
          <h2 class="form-title"><i class="bi bi-plus-lg"></i>New Asset</h2>
          <label class="form-label">Image(Optional)</label>
          <input class="form-control gold-input image-upload" type="file" />

          <div class="row g-2">
            <div class="col-6">
              <label class="form-label">Type</label>
              <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-tags"></i></span>
                <select class="form-select type-select gold-input" required>
                  <option selected disabled>choose type</option>
                  <option>Jewelry</option>
                  <option>Bars</option>
                  <option>Coins</option>
                </select>
              </div>
            </div>

            <div class="col-6">
              <label class="form-label">Category</label>
              <div class="input-group mb-3">
                <span class="input-group-text"
                  ><i class="bi bi-grid-3x3-gap"></i
                ></span>
                <select
                  class="form-select category-select gold-input"
                  required
                ></select>
              </div>
            </div>
          </div>

          <div class="row g-2">
            <div class="col-6">
              <label class="form-label">Karat</label>
              <div class="input-group mb-3">
                <span class="input-group-text"
                  ><i class="bi bi-award"></i
                ></span>
                <select class="form-select karat-select gold-input">
                  <option selected>24k</option>
                  <option>21k</option>
                  <option>18k</option>
                </select>
              </div>
            </div>

            <div class="col-6">
              <label class="form-label">Weight(g)</label>
              <div class="input-group mb-3">
                <span class="input-group-text"
                  ><i class="bi bi-speedometer2"></i
                ></span>
                <input
                  type="number"
                  step="0.01"
                  min="0.01"
                  class="form-control weight-input gold-input"
                  required
                />
              </div>
            </div>
          </div>
          <label class="form-label">Currency</label>
          <div class="input-group mb-3">
            <span class="input-group-text"
              ><i class="bi bi-cash-stack"></i
            ></span>
            <select class="form-select currency-select gold-input" required>
              <option cl>JOD</option>
              <option>USD</option>
            </select>
          </div>

          <div class="row g-2">
            <div class="col-6">
              <label class="form-label">Purchase Price</label>
              <div class="input-group mb-3">
                <span class="input-group-text"
                  ><i class="bi bi-currency-dollar"></i
                ></span>
                <input
                  type="number"
                  min="0"
                  class="form-control price-input gold-input"
                  required
                />
              </div>
            </div>

            <div class="col-6">
              <label class="form-label">Price per gram</label>
              <div class="input-group mb-3">
                <span class="input-group-text"><i class="bi bi-gem"></i></span>
                <input
                  type="number"
                  min="0"
                  class="form-control gram-price-input gold-input"
                  required
                />
              </div>
            </div>
          </div>
          <div>
            <label class="form-label">Purchase Date</label>
            <div class="input-group mb-3">
              <span class="input-group-text"
                ><i class="bi bi-calendar-check"></i
              ></span>
              <input
                type="date"
                class="form-control price-date gold-input"
                required
              />
            </div>
          </div>
          <input
            type="submit"
            class="btn w-100 submit-btn"
            value="SAVE ASSET"
          />
        </form>
      </div>

      <div class="col-lg-8">
        <div class="row g-3 cards"></div>
      </div>
    </div>
    <script src="../javascript/asset.js"></script>
     <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </body>
</html>
