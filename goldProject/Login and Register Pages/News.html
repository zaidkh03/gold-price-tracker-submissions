
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>News Slider</title>

    <!-- Swiper CSS -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
    />

    <!-- Swiper JS -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #f5f5f5;
      }

      .swiper {
        width: 90%;
        max-width: 800px;
        margin: 40px auto;
        height: 50px;
        background-color:#303643;
        border-radius: 18px;
    text-align: center;  
     
    

    }

    .swiper-button-next,
    .swiper-button-prev {
        color: #facc15;
        }

      .swiper-slide {
        background: #fff;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
        cursor: pointer;
      }

     

      .content {
        padding: 15px;
        background-color: #0f172a;
      }

      .content h3 {
        margin: 0 0 10px;
        font-size: 15px;
        color: gold;
    }


        .lable{
color: #0f172a;
  background: #facc15;
  padding: 4px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: bold;
  margin-right: 20px;
        }
        .swiper-slide:hover h3 {
          color: #facc15;
        }   
    </style>
</head>

  <body>
    <div class="swiper">
      <div class="swiper-wrapper" id="news"></div>

      <div class="swiper-button-next"></div>
      <div class="swiper-button-prev"></div>
      <div class="swiper-pagination"></div>
    </div>

    <script>
     
      let news = document.getElementById("news");

      let savednews = JSON.parse(localStorage.getItem("news")) || [];
      let lastFetch = parseInt(localStorage.getItem("newsTime"));

      let now = Date.now();

      // ⏱️ 10 minutes = 600000 ms
      if (savednews.length > 0 && lastFetch && now - lastFetch < 600000) {
        displayNews(savednews);
      } else {
        fetch(
          "https://newsdata.io/api/1/latest?apikey=pub_8cdfe34522554af9bab8604d4a8294f9&q=economy OR politics&language=en",
        )
          .then((res) => res.json())
          .then((data) => {
            let articles = data.results.slice(0, 4);

            localStorage.setItem("news", JSON.stringify(articles));
            localStorage.setItem("newsTime", now);

            displayNews(articles);
          })
          .catch(() => {
            console.log("API Error");

            // fallback
            if (savednews.length > 0) {
              displayNews(savednews);
            }
          });
      }

      function displayNews(articles) {
        news.innerHTML = ""; // clear old slides

        articles.forEach((article) => {
          let div = document.createElement("div");
          div.classList.add("swiper-slide");

          div.innerHTML = `
            <div class="content">
                <h3> <label class="lable"> Latest News | </label> ${article.title}</h3>
            </div>
        `;

          // make slide clickable
          div.addEventListener("click", () => {
            if (article.link) {
              window.open(article.link, "_blank");
            }
          });

          news.appendChild(div);
        });

        new Swiper(".swiper", {
          loop: true,
slidesPerView: "auto",
  spaceBetween: 50,
  speed: 4000,
  


          autoplay: {
            delay: 4000,
            disableOnInteraction: false,
          },

          pagination: {
            el: ".swiper-pagination",
            clickable: true,
          },

          navigation: {
            nextEl: ".swiper-button-next",
            prevEl: ".swiper-button-prev",
          },
        });
      }
    </script>
  </body>
</html>
