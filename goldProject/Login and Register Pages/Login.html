<!doctype html>
 <html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsSHA/2.0.2/sha.js"></script>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-image: url(Images/Gold_back.png);
        opacity: 0.9;
        background-position: center;
        background-size: cover;
        filter: brightness(0.7);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

body::before {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%; 
  background: rgba(0, 0, 0, 0.3);

}


      .container {
        background: #1e293b;
        opacity: 0.9;
        padding: 40px;
        border: 1px solid rgb(250,204,21,0.3);
        border-radius: 15px;
        width: 350px;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
        transition: 0.3s;
        position: relative;
        z-index: 1;
      }

      .container :hover{
transform: scale(1.02);


      }
      h2 {
        color: #facc15;
        text-align: center;
        margin-bottom: 20px;
      }

      input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: none;
        border-radius: 8px;
        background: #0f172a;
        color: white;
      }





      button {
        width: 100%;
        padding: 12px;
        background: #facc15;
        border: none;
        border-radius: 8px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
        box-shadow: 0 0 10px rgba(250, 204, 21, 0.5);
      }
      input,
      button {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 8px;
        display: block;
        box-sizing: border-box;
      }

      button:hover {
        background: #eab308;
      }
      input:focus {
outline: none;
 border: 1px solid #facc15;
 box-shadow:  0 0 5px #facc15;


} 

      p {
        color: #94a3b8;
        text-align: center;
      }

      a {
        color: #facc15;
        text-decoration: none;
      }

      @media (max-width: 720px) {
        .container {
          width: 90%;
          padding: 20px;
        }

        .container h2 {
          font-size: 24px;
        }
        .container input {
          padding: 10px;
        }
        .container button {
          padding: 10px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Login</h2>

      <input type="email" placeholder="Email" id="email" />
      <small id="email-error" style="color: red"></small>
      <input type="password" placeholder="Password" id="password" />
      <small id="password-error" style="color: red"></small>
      <button id="button">Login</button>

      <p>Don't have an account? <a href="Register.html"> Register</a></p>
    </div>

    <script>
let emailpatren = /^[a-zA-Z0-9.%+-]+@[a-zA-Z0-9.-]+\.[a-zA-Z]{2,}$/;  
    let email = document.getElementById("email");
      let password = document.getElementById("password");
      let button = document.getElementById("button");
      let emailError = document.getElementById("email-error");
      let passwordError = document.getElementById("password-error");
      button.addEventListener("click", () => {
        const users = JSON.parse(localStorage.getItem("users")) || [];

        const hashedPassword = hashPassword(password.value);

const user = users.find(u => 
  u.email === email.value && u.password === hashedPassword
);
        if (email.value === "" || password.value === "") {
          emailError.textContent = "Email is required";
          passwordError.textContent = "Password is required";
        } else if (!emailpatren.test(email.value)) {
          emailError.textContent = "Invalid email format";
        } else if (user) {
          sessionStorage.setItem("currentUser", JSON.stringify(user));
          window.location.href = "../index.html";
        } else {
          alert("Invalid email or password");
        }
      });


      function hashPassword(password) {
  const shaObj = new jsSHA("SHA-256", "TEXT", { encoding: "UTF8" });
  shaObj.update(password);
  return shaObj.getHash("HEX");
}
    </script>
  </body>
</html>
