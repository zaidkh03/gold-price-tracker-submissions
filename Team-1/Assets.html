<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Live Gold - Portfolio</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/Assets.css" />
  </head>
  <body>
    <header>
      <nav class="navbar navbar-expand-lg navbar-dark container">
        <a class="navbar-brand logo" href="#">💰 Gold Tracker</a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div
          class="collapse navbar-collapse justify-content-end"
          id="navbarNav"
        >
          <ul class="navbar-nav align-items-lg-center gap-2">
            <li class="nav-item">
              <a class="nav-link" href="index.html">Home</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="News.html">News</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="Assets.html">Assets</a>
            </li>

            <li class="nav-item">
              <a class="nav-link" href="Login.html" data-auth="login-link">Login</a>
            </li>

            <li class="nav-item" data-auth="register-item">
              <button class="btn btn-gold ms-lg-2 rounded-4">
                <a href="SignUp.html">Register</a>
              </button>
            </li>

            <li class="nav-item">
              <span class="nav-link" data-auth="greeting" style="display: none"></span>
            </li>
          </ul>
        </div>
      </nav>
    </header>

    <main class="container">
      <div class="overview-card">
        <p class="small text-uppercase mb-1">Total Portfolio Balance</p>
        <h1 class="display-3 fw-bold mb-2 text-white" id="totalBalance">
          $0.00
        </h1>
        <span id="totalChange" class="profit">No profit / loss yet</span>
      </div>

      <div class="row align-items-center mb-4">
        <div class="col-md-5">
          <h2 class="h4 m-0 text-uppercase fw-bold">My Holdings</h2>
        </div>
        <div class="col-md-4 mt-3 mt-md-0">
          <input
            type="text"
            id="searchInput"
            class="form-control"
            placeholder="🔍 Search assets..."
          />
        </div>
        <div class="col-md-3 text-md-end mt-3 mt-md-0">
          <a href="add-asset.html" class="btn-add-assets w-100 text-center"
            >+ Add Assets</a
          >
        </div>
      </div>
      <div class="row g-4" id="assetsGrid"></div>
    </main>

            <script src="./js/Assets.js"></script>
  </body>
</html>
