<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Gold Tracker</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
    />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪙</text></svg>"
    />
    <link rel="stylesheet" href="css/global.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>

  <body>
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand" href="index.html">
          <span class="logo-icon"
            ><img src="./assets/rashadi.png" style="width: 30px"
          /></span>
          Gold Tracker
        </a>
      </div>
    </nav>

    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-5">
          <div class="auth-card">
            <h3 class="text-center mb-4">Login</h3>

            <div class="mb-3">
              <label class="form-label">Email</label>
              <input
                type="email"
                id="login-email"
                class="field"
                placeholder="Enter your email"
              />
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input
                type="password"
                id="login-password"
                class="field"
                placeholder="Enter your password"
              />
              <div class="form-check mt-2">
                <input
                  class="form-check-input"
                  type="checkbox"
                  id="show-password"
                />
                <label
                  class="form-check-label text-white-50"
                  for="show-password"
                  style="font-size: 13px"
                >
                  Show Password
                </label>
              </div>
            </div>

            <div
              id="login-error"
              class="text-danger mb-3"
              style="display: none"
            ></div>

            <button class="btn btn-warning w-100" id="login-btn">Login</button>

            <p class="text-center mt-3">
              Don't have an account?
              <a href="register.html" class="text-warning">Register</a>
            </p>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/config.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
