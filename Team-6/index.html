<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <meta name="description"
        content="Track live gold prices, stay updated with latest market news, and manage your gold portfolio. Monitor your real-time profit and loss based on today's ounce price.">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/images/Kiraty-removebg-preview.png">
    <link rel="stylesheet" href="css/myAssets.css">
    <link rel="stylesheet" href="css/asset.css">
    <link rel="stylesheet" href="css/home.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Abel&display=swap" rel="stylesheet">
    <title>Home — KIRATY</title>
    <script>



    </script>
</head>

<body>
    <div class="maindev">

        <header id="header-placeholder"></header>
        <!-- <div class="content"> -->
        <div class="bodydiv">
            <section class="section-container">
                <div class="prices">
                    <div class="news">
                        <div class="newscard">
                            <div class="newsslider" id="newsslider">
                            </div>

                            <span class="badge">LATEST MARKET NEWS</span>
                            <div>
                                <h1 id="news-title">Loading...</h1>
                                <div class="bottom-row">
                                    <a id="news-link" href="#" target="_blank" style="text-decoration: none;">
                                        <button class="read-more">
                                            Read Article <span>&rarr;</span>
                                        </button>
                                    </a>

                                    <div class="pagination" id="news-pagination">
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="sideprices">
                        <div class="liveprice">
                            <div class="livepricefirst">
                                <p>LIVE OUNCE PRICE</p>
                                <h4 id="price-ounce">Loading...</h4>
                            </div>
                            <div class="livepricesecond">
                                <i class="fa-solid fa-arrow-trend-up"></i>
                            </div>
                        </div>

                        <div class="gramprice">

                            <div class="firstgram">
                                <div class="24K">
                                    <p>24K GRAM PRICE</p>
                                    <h4 id="price-24k">Loading...</h4>
                                </div>
                                <div><i class="fa-solid fa-database"></i></div>
                            </div>
                        </div>
                        <!-- <hr> -->
                        <div class="gramprice">
                            <div class="othergram">
                                <div class="21gram">
                                    <p>21K GRAM</p>
                                    <h4 id="price-21k">Loading...</h4>
                                </div>
                                <div class="18gram">
                                    <p>18K GRAM</p>
                                    <h4 id="price-18k">Loading...</h4>
                                </div>
                            </div>
                        </div>


                    </div>
                </div>
            </section>
            <!-- </div> -->
            <section class="section-container">
                <div class="chart">
                    <div class="charupper">
                        <p>Gold Price Chart</p>
                        <div class="intervalchart">
                            <button id="day" class="selected">1D</button>
                            <button id="month">1M</button>

                        </div>
                    </div>
                    <div class="chardraw">
                        <canvas id="myChart" class="mychart"></canvas>
                    </div>
                </div>
            </section>
            <section class="section-container">
                <div class="goldpricesection">
                    <h2>Main Gold Price</h2>
                </div>

                <div class="gold_prices_div">
                    <div class="gold-price-card">
                        <div class="upper-gold-price">
                            <img src="images/Rashadi_Gold.png">
                            <p>Rashadi Coin</p>
                        </div>
                        <div class="lowe-gold-price">
                            <h4 id="rashadi">Loading ...</h4>
                        </div>
                    </div>
                    <div class="gold-price-card">
                        <div class="upper-gold-price">
                            <img src="images/English.png">
                            <p>English Coin</p>
                        </div>
                        <div class="lowe-gold-price">
                            <h4 id="english_coin">Loading ...</h4>
                        </div>
                    </div>
                    <div class="gold-price-card">
                        <div class="upper-gold-price">
                            <img style="width: 63px;" src="images/Fine_Gold_1Kilo.png">
                            <p>1KG Bar</p>
                        </div>
                        <div class="lowe-gold-price">
                            <h4 id="1kg_bar">Loading ...</h4>
                        </div>
                    </div>
                </div>
            </section>

            <section class="section-container">
                <div class="my-assets-section">
                    <h2>My Assets</h2>
                    <div id="assetsContainer" class="assetsContainer">

                    </div>
                    <a href="html/myAssets.html">
                        <div id="botton_assets" class="botton_assets"><Button>View All assets</Button></div>
                    </a>

                </div>
            </section>
        </div>
        <footer id="footer-placeholder"></footer>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/Template/template.js"></script>
    <script src="js/chart.js"></script>
    <script src="js/mainBackEnd.js"></script>
    <script src="js/home.js"></script>
    <script src="js/homenews.js"></script>
</body>

</html>
