            <option value="21k">21k</option>
            <option value="18k">18k</option>
          </select>
        </div>

      </div>
    </section>

  <footer id="footer-placeholder"></footer>

  <!-- Add New Asset Modal -->
  <div class="modal fade" id="addAssetModal" tabindex="-1" aria-labelledby="addAssetModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content" style="background-color: #1C1B1B; color: #E5E2E1;">
        <div class="modal-header">
          <h5 class="modal-title" id="addAssetModalLabel">Add New Asset</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="addAssetForm">
            <div class="mb-3 input1">
              <label for="input1_assetName" class="form-label">Asset Name</label>
              <input type="text" class="form-control" id="input1_assetName" placeholder="Enter asset name">
              <small id="input1_Small"></small>
            </div>



            <div class="mb-3 input2">
              <label for="kirat" class="form-label">Kirat</label>
              <select class="form-control" id="input2_kirat">
                <option value="" selected disabled>Select Kirat</option>
                <option value="24k">24k</option>
                <option value="21k">21k</option>
                <option value="18k">18k</option>
              </select>
              <small id="input2_Small"></small>
            </div>



            <div class="mb-3 input3">
              <label for="input3_assetType" class="form-label">Asset Type</label>
              <select class="form-control" id="input3_assetType">
                <option value="" selected disabled>Select Asset Type</option>
                <option value="Jewelry" id="input3_assetType_Jewelry">Jewelry</option>
                <option value="Coins" id="input3_assetType_Coins">Coins</option>
                <option value="Gold_bars" id="input3_assetType_Bars">Gold Bars</option>
              </select>
              <small id="input3_Small"></small>
            </div>



            <div class="mb-3 input4 d-none">
              <label for="input4_typeJewlery" class="form-label">Jewelry Type</label>
              <select class="form-control" id="input4_typeJewlery">
                <option value="" selected disabled>Select Jewelry Type</option>
                <option value="ring">Ring</option>
                <option value="bracelet">Bracelet</option>
                <option value="necklace">Necklace</option>
                <option value="earrings">Earrings</option>
                <option value="other">other</option>
              </select>
              <small id="input4_Small"></small>
            </div>



            <div class="mb-3 input5 d-none">
              <label for="input5_typeCoins" class="form-label">Coin Type</label>
              <select class="form-control" id="input5_typeCoins">
                <option value="" selected disabled>Select Coin Type</option>
                <option value="eCoin">English Coin (8g)</option>
                <option value="rCoin">Rashadi Coin (7g)</option>
              </select>
              <small id="input5_Small"></small>
            </div>



            <div class="mb-3 input6 d-none">
              <label for="input6_typeBars" class="form-label">Bar Type</label>
              <select class="form-control" id="input6_typeBars">
                <option value="" selected disabled>Select Bar Type</option>
                <option value="one_bullion">1 Bullion Bar (1Kg)</option>
                <option value="one_ounce">1 Ounce (31.10 g)</option>
                <option value="half_ounce">1/2 Ounce (15.55 g)</option>
                <option value="other">other</option>
              </select>
              <small id="input6_Small"></small>
            </div>


            <div class="mb-3 input7">
              <label for="weight" class="form-label">Weight (g)</label>
              <input type="number" class="form-control" id="input7_weight" placeholder="Enter weight">
              <small id="input7_Small"></small>
            </div>
            <div class="mb-3 input8">
              <label for="purchasePrice" class="form-label">Purchase Price ($)</label>
              <input type="number" class="form-control" id="input8_purchasePrice" placeholder="Enter purchase price">
              <small id="input8_Small"></small>
            </div>
            <div class="mb-3 input9">
              <label for="purchaseDate" class="form-label">Purchase Date</label>
              <input type="date" class="form-control" id="input9_purchaseDate">
              <small id="input9_Small"></small>
            </div>
            <div class="mb-3 input10">
              <label for="assetImage" class="form-label">Asset Image </label>
              <input type="file" class="form-control" id="input10_assetImage">
              <small id="input10_Small"></small>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" id="closeAssetBtn">Cancel</button>
          <button type="submit" form="addAssetForm" class="btn btn-warning" id="saveAssetBtn">Save Asset</button>
        </div>
      </div>
    </div>
